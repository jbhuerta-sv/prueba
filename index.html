<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia de Estudiantes</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon-180.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --azul:#0f2a4a;
    --azul-claro:#1d4e7e;
    --fondo:#f3f5f8;
    --panel:#ffffff;
    --verde:#16a34a;
    --verde-suave:#e7f6ec;
    --rojo:#dc2626;
    --rojo-suave:#fdeaea;
    --gris:#9aa7b4;
    --gris-suave:#eef1f5;
    --texto:#1c2733;
    --texto-suave:#5b6b7b;
    --borde:#dde4ec;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    background:var(--fondo);color:var(--texto);
    display:flex;flex-direction:column;height:100vh;overflow:hidden;
  }

  /* ===== Encabezado ===== */
  header{
    background:var(--azul);color:#fff;
    padding:10px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  }
  header h1{font-size:17px;font-weight:600;letter-spacing:.3px}
  header .sub{font-size:12px;opacity:.75}
  .header-derecha{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .btn{
    background:#fff;color:var(--azul);border:none;border-radius:6px;
    padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;
  }
  .btn:hover{background:#e8eef5}
  .btn:disabled{opacity:.6;cursor:wait}
  .btn .icono{display:inline-block;transition:transform .4s}
  .btn.cargando .icono{animation:girar 1s linear infinite}
  @keyframes girar{to{transform:rotate(360deg)}}
  select.ctrl{
    background:var(--azul-claro);color:#fff;border:1px solid rgba(255,255,255,.3);
    border-radius:6px;padding:7px 8px;font-size:12px;cursor:pointer;
  }
  .ultima{font-size:11px;opacity:.8}

  /* ===== Barra de filtros ===== */
  .filtros-barra{
    display:flex;gap:14px;align-items:center;flex-wrap:wrap;
    padding:10px 18px;background:var(--fondo);border-bottom:1px solid var(--borde);
  }
  .filtro-grupo{display:flex;align-items:center;gap:6px}
  .filtro-grupo label{font-size:11px;color:var(--texto-suave);text-transform:uppercase;letter-spacing:.5px}
  .filtros-barra select{
    background:#fff;border:1px solid var(--borde);border-radius:6px;
    padding:7px 10px;font-size:13px;cursor:pointer;color:var(--texto);
  }

  /* ===== Tarjetas resumen (botón de filtro) ===== */
  .resumen{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;padding:12px 18px;
  }
  .tarjeta{
    background:var(--panel);border:1px solid var(--borde);border-radius:10px;
    padding:10px 14px;cursor:pointer;transition:all .15s;border-left:4px solid var(--borde);
  }
  .tarjeta:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
  .tarjeta.activa{border-color:var(--azul);box-shadow:0 0 0 2px rgba(15,42,74,.12)}
  .tarjeta .valor{font-size:24px;font-weight:700;line-height:1.1}
  .tarjeta .etiqueta{font-size:11px;color:var(--texto-suave);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .tarjeta.t-escuelas{border-left-color:var(--azul-claro)}
  .tarjeta.t-escuelas .valor{color:var(--azul-claro)}
  .tarjeta.t-asistentes{border-left-color:var(--verde)}
  .tarjeta.t-asistentes .valor{color:var(--verde)}
  .tarjeta.t-ausentes{border-left-color:var(--rojo)}
  .tarjeta.t-ausentes .valor{color:var(--rojo)}
  .tarjeta.t-pendientes{border-left-color:var(--gris)}
  .tarjeta.t-pendientes .valor{color:var(--texto-suave)}

  /* ===== Cuerpo: tabla escuelas + mapa ===== */
  .cuerpo{flex:1;display:flex;min-height:0}
  aside{
    width:330px;min-width:260px;background:var(--panel);
    border-right:1px solid var(--borde);display:flex;flex-direction:column;
  }
  .aside-cab{padding:10px 12px;border-bottom:1px solid var(--borde);font-size:12px;font-weight:700;color:var(--texto-suave);text-transform:uppercase;letter-spacing:.5px}
  .controles{padding:8px 10px;border-bottom:1px solid var(--borde)}
  .controles input{
    width:100%;padding:8px 10px;border:1px solid var(--borde);border-radius:6px;font-size:13px;
  }
  .lista-escuelas{flex:1;overflow-y:auto}
  .esc-item{
    padding:9px 12px;border-bottom:1px solid var(--borde);cursor:pointer;
    display:flex;gap:9px;align-items:flex-start;
  }
  .esc-item:hover{background:#f0f4f9}
  .esc-item .punto{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0}
  .punto.verde{background:var(--verde)}
  .punto.rojo{background:var(--rojo)}
  .punto.gris{background:var(--gris)}
  .esc-item .nombre{font-size:12.5px;font-weight:600;line-height:1.25}
  .esc-item .meta{font-size:10.5px;color:var(--texto-suave);margin-top:2px}
  .esc-item .cifras{margin-left:auto;text-align:right;flex-shrink:0}
  .esc-item .cifras .frac{font-size:13px;font-weight:700}
  .esc-item .cifras .lbl{font-size:9.5px;color:var(--texto-suave)}
  .vacio{padding:24px;text-align:center;color:var(--texto-suave);font-size:13px}

  .centro{flex:1;display:flex;flex-direction:column;min-width:0}
  #mapa{flex:1;min-height:0}

  /* ===== Listado de estudiantes (abajo) ===== */
  .estudiantes-panel{
    height:210px;background:var(--panel);border-top:1px solid var(--borde);
    display:flex;flex-direction:column;
  }
  .est-cab{
    padding:8px 12px;border-bottom:1px solid var(--borde);
    display:flex;align-items:center;gap:10px;
  }
  .est-cab .titulo{font-size:12px;font-weight:700;color:var(--texto-suave);text-transform:uppercase;letter-spacing:.5px}
  .est-cab input{
    margin-left:auto;width:240px;max-width:50%;padding:6px 9px;
    border:1px solid var(--borde);border-radius:6px;font-size:12.5px;
  }
  .est-scroll{flex:1;overflow:auto}
  table{width:100%;border-collapse:collapse;font-size:12px}
  thead th{
    position:sticky;top:0;background:var(--gris-suave);text-align:left;
    padding:7px 10px;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;
    color:var(--texto-suave);border-bottom:1px solid var(--borde);white-space:nowrap;
  }
  tbody td{padding:6px 10px;border-bottom:1px solid var(--borde);white-space:nowrap}
  tbody tr:hover{background:#f6f9fc}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700}
  .badge.si{background:var(--verde-suave);color:var(--verde)}
  .badge.no{background:var(--rojo-suave);color:var(--rojo)}
  .badge.pend{background:var(--gris-suave);color:var(--texto-suave)}

  /* ===== Popup / aviso / leyenda ===== */
  .popup-nombre{font-weight:700;font-size:13px;margin-bottom:2px}
  .popup-meta{font-size:11px;color:var(--texto-suave);margin-bottom:6px}
  .popup-stat{font-size:12px;margin:1px 0}
  .aviso{
    position:absolute;top:12px;left:50%;transform:translateX(-50%);
    background:var(--rojo);color:#fff;padding:8px 16px;border-radius:8px;
    font-size:13px;z-index:2000;display:none;max-width:90%;
  }
  .leyenda{
    background:#fff;padding:8px 12px;border-radius:8px;
    box-shadow:0 1px 5px rgba(0,0,0,.25);font-size:12px;line-height:1.8;
  }
  .leyenda .pt{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}

  @media (max-width:820px){
    .cuerpo{flex-direction:column}
    aside{width:100%;max-height:32%;border-right:none;border-bottom:1px solid var(--borde)}
    .estudiantes-panel{height:180px}
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Asistencia de Estudiantes</h1>
    <div class="sub">Datos en vivo desde Google Sheets · pestañas Centros Escolares y Estudiantes</div>
  </div>
  <div class="header-derecha">
    <span class="ultima" id="ultima">Sin datos cargados</span>
    <select class="ctrl" id="autoRefresco" title="Actualización automática">
      <option value="0">Auto: apagado</option>
      <option value="60" selected>Auto: cada 1 min</option>
      <option value="300">Auto: cada 5 min</option>
      <option value="600">Auto: cada 10 min</option>
    </select>
    <button class="btn" id="btnActualizar"><span class="icono">⟳</span> Actualizar datos</button>
  </div>
</header>

<div class="filtros-barra">
  <div class="filtro-grupo">
    <label for="selFecha">Fecha</label>
    <select id="selFecha"></select>
  </div>
  <div class="filtro-grupo">
    <label for="selTurno">Turno</label>
    <select id="selTurno"></select>
  </div>
</div>

<div class="resumen">
  <div class="tarjeta t-escuelas activa" id="cardEscuelas" data-f="todas">
    <div class="valor" id="numEscuelas">–</div>
    <div class="etiqueta">Escuelas reportadas</div>
  </div>
  <div class="tarjeta t-asistentes" id="cardAsistentes" data-f="asistentes">
    <div class="valor" id="numAsistentes">–</div>
    <div class="etiqueta">Niños asistentes</div>
  </div>
  <div class="tarjeta t-ausentes" id="cardAusentes" data-f="ausentes">
    <div class="valor" id="numAusentes">–</div>
    <div class="etiqueta">Niños ausentes</div>
  </div>
  <div class="tarjeta t-pendientes" id="cardPendientes" data-f="pendientes">
    <div class="valor" id="numPendientes">–</div>
    <div class="etiqueta">Escuelas pendientes</div>
  </div>
</div>

<div class="cuerpo">
  <aside>
    <div class="aside-cab">Escuelas</div>
    <div class="controles">
      <input type="text" id="buscarEsc" placeholder="Buscar escuela o código…">
    </div>
    <div class="lista-escuelas" id="listaEscuelas"><div class="vacio">Cargando datos…</div></div>
  </aside>
  <div class="centro">
    <div id="mapa"></div>
    <div class="estudiantes-panel">
      <div class="est-cab">
        <span class="titulo">Estudiantes</span>
        <span class="titulo" id="contadorEst" style="font-weight:400;text-transform:none"></span>
        <input type="text" id="buscarEst" placeholder="Buscar estudiante, escuela o NIE…">
      </div>
      <div class="est-scroll">
        <table>
          <thead>
            <tr>
              <th>Estudiante</th><th>Escuela</th><th>Sección</th>
              <th>Fecha</th><th>Turno</th><th>Asistencia</th>
            </tr>
          </thead>
          <tbody id="tbodyEst"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="aviso" id="aviso"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ================= CONFIGURACIÓN ================= */
const SHEET_ID = "1OYIuc2dyP5GfQEcbo8GLjke-L4ZdYcqhnliVyUzUl8U";
const SHEET_ESCUELAS = "Centros Escolares";
const SHEET_ESTUDIANTES = "Estudiantes";
function urlsGviz(hoja){
  const base = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(hoja)}`;
  return {json: base + "&tqx=out:json", csv: base + "&tqx=out:csv"};
}

/* ================= ESTADO ================= */
let escuelas = [];        // {codigo, nombre, distrito, lat, lng}
let estudiantes = [];     // {codigo, escuela, nie, nombre, seccion, fecha, turno, registrado, asistio}
let fechasDisponibles = [];
let turnosDisponibles = [];
let fechaSel = "";        // "" = ninguna fecha seleccionada (todo gris salvo asistencia)
let turnoSel = "TODOS";
let filtroTarjeta = "todas"; // todas | asistentes | ausentes | pendientes
let busquedaEsc = "";
let busquedaEst = "";
let temporizador = null;
let marcadores = {};
let estadoEsc = {};       // codigo -> {color, presentes, ausentes, pendientes, registrados, total, reporto, pendiente}
let ultimoError = null;

/* ================= MAPA ================= */
const mapa = L.map("mapa").setView([13.70, -89.15], 10);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19, attribution: "&copy; OpenStreetMap"
}).addTo(mapa);
const capaMarcadores = L.layerGroup().addTo(mapa);
let yaAjustado = false;

const leyenda = L.control({position:"bottomright"});
leyenda.onAdd = function(){
  const div = L.DomUtil.create("div","leyenda");
  div.innerHTML =
    '<span class="pt" style="background:#16a34a"></span> Tomó asistencia<br>' +
    '<span class="pt" style="background:#dc2626"></span> Pendiente (en la fecha)<br>' +
    '<span class="pt" style="background:#9aa7b4"></span> Otra fecha / sin reportar';
  return div;
};
leyenda.addTo(mapa);

/* ================= UTILIDADES ================= */
function normalizar(t){
  return String(t||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();
}
function fechaISO(v, f){
  let m = String(v||"").match(/Date\((\d+),(\d+),(\d+)/);
  if(m) return `${m[1]}-${String(parseInt(m[2],10)+1).padStart(2,"0")}-${String(m[3]).padStart(2,"0")}`;
  const t = String(f || v || "").trim();
  m = t.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return `${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`;
  m = t.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
  if(m) return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
  return t;
}
function esUno(v){
  const n = normalizar(v);
  return n === "1" || n === "1.0" || n === "si" || n === "sí" || n === "true";
}
// ¿La celda ASISTENCIA tiene algún valor? (registrada = no vacía). Ojo: 0 cuenta como valor.
function tieneValor(v){
  return v !== null && v !== undefined && String(v).trim() !== "";
}
function indiceCol(cols, candidatos, porDefecto){
  for(const cand of candidatos){ const i = cols.indexOf(cand); if(i >= 0) return i; }
  return porDefecto;
}

/* ================= CARGA ================= */
async function cargarDatos(){
  const btn = document.getElementById("btnActualizar");
  btn.disabled = true; btn.classList.add("cargando");
  ocultarAviso(); ultimoError = null;

  const filasEsc = await cargarTabla(SHEET_ESCUELAS, parsearEscuelasGviz, parsearEscuelasCSV);
  if(filasEsc && filasEsc.length > 0) escuelas = unicasPorCodigo(filasEsc);

  const filasEst = await cargarTabla(SHEET_ESTUDIANTES, parsearEstudiantesGviz, parsearEstudiantesCSV);
  if(filasEst) estudiantes = filasEst;

  if(escuelas.length > 0 && estudiantes !== null){
    actualizarFiltros();
    procesarYPintar();
    document.getElementById("ultima").textContent =
      "Última actualización: " + new Date().toLocaleTimeString("es-SV",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  }else{
    console.error(ultimoError);
    mostrarAviso("No se pudieron cargar los datos. Si está viendo este archivo dentro del visor de Claude, descárguelo y ábralo en Chrome o Edge. Detalle: " + (ultimoError?ultimoError.message:"desconocido"));
  }
  btn.disabled = false; btn.classList.remove("cargando");
}

async function cargarTabla(hoja, parserGviz, parserCSV){
  const urls = urlsGviz(hoja);
  try{ return parserGviz(extraerJsonGviz(await fetchTexto(urls.json))); }
  catch(e){ ultimoError = e; console.warn(`[${hoja}] JSON falló:`, e.message); }
  try{ return parserCSV(await fetchTexto(urls.csv)); }
  catch(e){ ultimoError = e; console.warn(`[${hoja}] CSV falló:`, e.message); }
  try{ return parserGviz(await cargarViaJsonp(urls.json)); }
  catch(e){ ultimoError = e; console.warn(`[${hoja}] JSONP falló:`, e.message); }
  return null;
}

async function fetchTexto(url){
  const resp = await fetch(url + "&_=" + Date.now(), {cache:"no-store"});
  if(!resp.ok) throw new Error("HTTP " + resp.status);
  return await resp.text();
}
function extraerJsonGviz(texto){
  const i = texto.indexOf("{"), f = texto.lastIndexOf("}");
  if(i<0||f<0) throw new Error("Respuesta gviz no reconocida");
  const json = JSON.parse(texto.substring(i,f+1));
  if(json.status === "error") throw new Error(json.errors?.[0]?.detailed_message || "Error de gviz");
  return json;
}
function cargarViaJsonp(url){
  return new Promise((resolver, rechazar)=>{
    window.google = window.google || {};
    window.google.visualization = window.google.visualization || {};
    window.google.visualization.Query = window.google.visualization.Query || {};
    window.google.visualization.Query.setResponse = function(json){
      limpiar();
      if(json.status === "error") rechazar(new Error(json.errors?.[0]?.detailed_message || "Error de gviz"));
      else resolver(json);
    };
    const s = document.createElement("script");
    s.src = url + "&_=" + Date.now();
    s.onerror = ()=>{ limpiar(); rechazar(new Error("No se pudo cargar el script de Google Sheets")); };
    const t = setTimeout(()=>{ limpiar(); rechazar(new Error("Tiempo de espera agotado (JSONP)")); }, 15000);
    function limpiar(){ clearTimeout(t); if(s.parentNode) s.parentNode.removeChild(s); }
    document.head.appendChild(s);
  });
}

/* ---- Parsers Centros Escolares ---- */
function idxEsc(cols){
  return {
    codigo: indiceCol(cols, ["codigo","código","codigo ce","codigo sede"], 0),
    nombre: indiceCol(cols, ["centro escolar","centro educativo","nombre","escuela"], 1),
    distrito: indiceCol(cols, ["distrito"], -1),
    lat: indiceCol(cols, ["latitude","latitud","lat"], -1),
    lng: indiceCol(cols, ["longitude","longitud","lng","lon"], -1)
  };
}
function armarEsc(codigoV, nombreV, distritoV, latV, lngV){
  const codigo = String(codigoV ?? "").trim();
  const nombre = String(nombreV ?? "").trim();
  const lat = parseFloat(latV), lng = parseFloat(lngV);
  if(!codigo || !nombre) return null;
  const valida = lat>12.5 && lat<14.8 && lng>-90.5 && lng<-87.0;
  return {
    codigo, nombre,
    distrito: String(distritoV ?? "").trim(),
    lat: valida?lat:null, lng: valida?lng:null
  };
}
function parsearEscuelasGviz(json){
  const cols = (json.table.cols||[]).map(c=>normalizar(c.label));
  const ix = idxEsc(cols);
  const out = [];
  for(const f of (json.table.rows||[])){
    const c=f.c||[]; const v=i=>(i>=0&&c[i])?c[i].v:null;
    const e = armarEsc(v(ix.codigo), v(ix.nombre), v(ix.distrito), v(ix.lat), v(ix.lng));
    if(e) out.push(e);
  }
  return out;
}
function parsearEscuelasCSV(texto){
  const filas = lineasCSV(texto); if(filas.length<2) return [];
  const cols = filas[0].map(normalizar); const ix = idxEsc(cols);
  const out=[];
  for(let i=1;i<filas.length;i++){
    const f=filas[i]; const v=j=>(j>=0?f[j]:null);
    const e = armarEsc(v(ix.codigo), v(ix.nombre), v(ix.distrito), v(ix.lat), v(ix.lng));
    if(e) out.push(e);
  }
  return out;
}

/* ---- Parsers Estudiantes ---- */
function idxEst(cols){
  return {
    codigo: indiceCol(cols, ["codigo","código"], 0),
    escuela: indiceCol(cols, ["centro educativo","centro escolar","escuela"], 1),
    nie: indiceCol(cols, ["nie"], 2),
    nombre: indiceCol(cols, ["estudiante","nombre"], 3),
    seccion: indiceCol(cols, ["seccion","sección"], -1),
    fecha: indiceCol(cols, ["fecha"], -1),
    turno: indiceCol(cols, ["turno","horario"], -1),
    asistencia: indiceCol(cols, ["asistencia"], -1)
  };
}
function armarEst(codigoV, escuelaV, nieV, nombreV, seccionV, fechaV, turnoV, asistV){
  const codigo = String(codigoV ?? "").trim();
  const nombre = String(nombreV ?? "").trim();
  if(!codigo || !nombre) return null;
  const registrado = tieneValor(asistV);   // celda con 0 ó 1 (pasó asistencia)
  return {
    codigo, escuela: String(escuelaV ?? "").trim(),
    nie: String(nieV ?? "").trim(),
    nombre,
    seccion: String(seccionV ?? "").trim(),
    fecha: fechaV, turno: String(turnoV ?? "").trim(),
    registrado,                            // true = la escuela ya reportó a este alumno
    asistio: registrado && esUno(asistV)   // true = presente (1); 0 -> ausente; vacío -> pendiente
  };
}
function parsearEstudiantesGviz(json){
  const cols = (json.table.cols||[]).map(c=>normalizar(c.label));
  const ix = idxEst(cols);
  const out=[];
  for(const f of (json.table.rows||[])){
    const c=f.c||[]; const cel=i=>(i>=0&&c[i])?c[i]:{};
    const e = armarEst(cel(ix.codigo).v, cel(ix.escuela).v, cel(ix.nie).v, cel(ix.nombre).v,
      cel(ix.seccion).v, fechaISO(cel(ix.fecha).v, cel(ix.fecha).f), cel(ix.turno).v, cel(ix.asistencia).v);
    if(e) out.push(e);
  }
  return out;
}
function parsearEstudiantesCSV(texto){
  const filas = lineasCSV(texto); if(filas.length<2) return [];
  const cols = filas[0].map(normalizar); const ix = idxEst(cols);
  const out=[];
  for(let i=1;i<filas.length;i++){
    const f=filas[i]; const v=j=>(j>=0?f[j]:null);
    const e = armarEst(v(ix.codigo), v(ix.escuela), v(ix.nie), v(ix.nombre),
      v(ix.seccion), fechaISO(v(ix.fecha), null), v(ix.turno), v(ix.asistencia));
    if(e) out.push(e);
  }
  return out;
}

/* ---- CSV helpers ---- */
function lineasCSV(texto){
  return texto.split(/\r?\n/).filter(l=>l.trim()!=="").map(divideCSV);
}
function divideCSV(linea){
  const campos=[]; let actual=""; let q=false;
  for(let i=0;i<linea.length;i++){
    const ch=linea[i];
    if(ch==='"'){ if(q&&linea[i+1]==='"'){actual+='"';i++;} else q=!q; }
    else if(ch===","&&!q){ campos.push(actual); actual=""; }
    else actual+=ch;
  }
  campos.push(actual); return campos;
}

/* ================= FILTROS ================= */
function actualizarFiltros(){
  fechasDisponibles = [...new Set(estudiantes.map(e=>e.fecha).filter(Boolean))].sort();
  turnosDisponibles = [...new Set(estudiantes.map(e=>e.turno).filter(Boolean))].sort();

  const sF = document.getElementById("selFecha"), antF = fechaSel;
  sF.innerHTML = '<option value="">— Ninguna fecha —</option>';
  for(const f of fechasDisponibles){
    const o=document.createElement("option"); o.value=f; o.textContent=f; sF.appendChild(o);
  }
  fechaSel = (antF==="" || fechasDisponibles.includes(antF)) ? antF : "";
  sF.value = fechaSel;

  const sT = document.getElementById("selTurno"), antT = turnoSel;
  sT.innerHTML = '<option value="TODOS">Todos los turnos</option>';
  for(const t of turnosDisponibles){
    const o=document.createElement("option"); o.value=t; o.textContent=t; sT.appendChild(o);
  }
  turnoSel = (antT==="TODOS" || turnosDisponibles.includes(antT)) ? antT : "TODOS";
  sT.value = turnoSel;
}

// estudiantes que pasan el filtro de turno (la fecha se maneja aparte según el modo del mapa)
function pasaTurno(e){ return turnoSel==="TODOS" || e.turno===turnoSel; }

// El catálogo puede traer una escuela en varias filas (p. ej. dos turnos).
// Deja un solo registro por código para no duplicar conteos, marcadores ni filas.
function unicasPorCodigo(lista){
  const map = {};
  for(const e of lista){
    if(!e || !e.codigo) continue;
    const prev = map[e.codigo];
    if(!prev){
      map[e.codigo] = e;
    }else if((prev.lat===null || prev.lng===null) && e.lat!==null && e.lng!==null){
      prev.lat = e.lat; prev.lng = e.lng;   // completa coordenadas si a la primera le faltaban
    }
  }
  return Object.values(map);
}

/* ================= LÓGICA DE ESTADO ================= */
function procesarYPintar(){
  estadoEsc = {};
  for(const esc of escuelas){
    estadoEsc[esc.codigo] = {color:"gris", presentes:0, ausentes:0, pendientes:0,
                             registrados:0, total:0, reporto:false, pendiente:false};
  }
  // Recorre estudiantes aplicando turno; la fecha define el "modo" de color
  for(const est of estudiantes){
    if(!pasaTurno(est)) continue;
    const st = estadoEsc[est.codigo];
    if(!st) continue;
    // Para los conteos de la escuela en el contexto actual:
    // - si hay fecha seleccionada, solo cuentan los de esa fecha
    // - si no hay fecha, cuentan todos
    const enContexto = (fechaSel==="") ? true : (est.fecha===fechaSel);
    if(!enContexto) continue;
    st.total++;
    if(!est.registrado){          // celda vacía -> pendiente
      st.pendientes++;
    }else{
      st.registrados++;
      if(est.asistio) st.presentes++;   // 1 -> presente
      else st.ausentes++;               // 0 -> ausente real
    }
  }
  // Determina estado y color de cada escuela
  for(const esc of escuelas){
    const st = estadoEsc[esc.codigo];
    st.reporto   = st.registrados > 0;                 // pasó asistencia (aunque todos sean ausentes)
    st.pendiente = st.total > 0 && st.registrados === 0; // tiene alumnos pero no ha reportado
    if(fechaSel===""){
      // Sin fecha (acumulado): verde si alguna vez reportó; gris si nunca
      st.color = st.reporto ? "verde" : "gris";
    }else{
      // Con fecha: gris si no le toca; verde si reportó esa fecha; rojo si está pendiente
      if(st.total===0)      st.color = "gris";
      else if(st.reporto)   st.color = "verde";
      else                  st.color = "rojo";
    }
  }
  pintarResumen(); pintarMapa(); pintarListaEscuelas(); pintarTablaEstudiantes();
}

/* ================= RENDER ================= */
function pintarResumen(){
  let escReportadas=0, escPendientes=0, presentes=0, ausentes=0;
  for(const esc of escuelas){
    const st = estadoEsc[esc.codigo];
    if(st.reporto)   escReportadas++;
    if(st.pendiente) escPendientes++;
    presentes += st.presentes;
    ausentes  += st.ausentes;   // ausentes = ceros reales (escuelas que ya reportaron)
  }
  document.getElementById("numEscuelas").textContent   = escReportadas.toLocaleString("es-SV");
  document.getElementById("numAsistentes").textContent = presentes.toLocaleString("es-SV");
  document.getElementById("numAusentes").textContent   = ausentes.toLocaleString("es-SV");
  document.getElementById("numPendientes").textContent = escPendientes.toLocaleString("es-SV");
}

const COLORES = {verde:"#16a34a", rojo:"#dc2626", gris:"#9aa7b4"};

function pintarMapa(){
  capaMarcadores.clearLayers(); marcadores={};
  const q = normalizar(busquedaEsc);
  for(const esc of escuelas){
    if(esc.lat===null||esc.lng===null) continue;
    if(q && !normalizar(esc.nombre).includes(q) && !esc.codigo.includes(q)) continue;
    const st = estadoEsc[esc.codigo];
    const m = L.circleMarker([esc.lat,esc.lng],{
      radius:7, color:"#fff", weight:1.5,
      fillColor:COLORES[st.color], fillOpacity: st.color==="gris"?0.7:0.92
    });
    m.bindPopup(htmlPopup(esc, st), {minWidth:200});
    m.addTo(capaMarcadores); marcadores[esc.codigo]=m;
  }
  if(!yaAjustado && Object.keys(marcadores).length>0){
    mapa.fitBounds(L.featureGroup(Object.values(marcadores)).getBounds().pad(0.08));
    yaAjustado=true;
  }
}
function htmlPopup(esc, st){
  const ctx = fechaSel==="" ? "Acumulado (sin fecha)" : ("Fecha " + fechaSel);
  let estado;
  if(st.color==="verde") estado='<span style="color:#16a34a;font-weight:700">Tomó asistencia</span>';
  else if(st.color==="rojo") estado='<span style="color:#dc2626;font-weight:700">Pendiente (no ha tomado asistencia)</span>';
  else if(st.pendiente) estado='<span style="color:#9aa7b4;font-weight:700">Pendiente (sin reportar)</span>';
  else estado='<span style="color:#9aa7b4;font-weight:700">Sin actividad en este filtro</span>';
  let stats = `<div class="popup-stat">Presentes: <b style="color:#16a34a">${st.presentes}</b> · Ausentes: <b style="color:#dc2626">${st.ausentes}</b></div>`;
  if(st.pendientes>0) stats += `<div class="popup-stat">Pendientes: <b style="color:#5b6b7b">${st.pendientes}</b></div>`;
  return `<div class="popup-nombre">${esc.nombre}</div>`+
    `<div class="popup-meta">Código ${esc.codigo}${esc.distrito?" · "+esc.distrito:""} · ${ctx}</div>`+
    `<div class="popup-stat">${estado}</div>`+
    stats;
}

function pintarListaEscuelas(){
  const cont = document.getElementById("listaEscuelas");
  const q = normalizar(busquedaEsc);
  let lista = escuelas.filter(esc=>!q || normalizar(esc.nombre).includes(q) || esc.codigo.includes(q));
  // filtro por tarjeta activa
  if(filtroTarjeta==="asistentes") lista = lista.filter(e=>estadoEsc[e.codigo].presentes>0);
  else if(filtroTarjeta==="ausentes") lista = lista.filter(e=>estadoEsc[e.codigo].ausentes>0);
  else if(filtroTarjeta==="pendientes") lista = lista.filter(e=>estadoEsc[e.codigo].pendiente);
  if(lista.length===0){ cont.innerHTML='<div class="vacio">No hay escuelas que coincidan.</div>'; return; }
  const peso={rojo:0,gris:1,verde:2};
  lista.sort((a,b)=>{
    const ea=estadoEsc[a.codigo], eb=estadoEsc[b.codigo];
    if(peso[ea.color]!==peso[eb.color]) return peso[ea.color]-peso[eb.color];
    return a.nombre.localeCompare(b.nombre,"es");
  });
  cont.innerHTML = lista.map(esc=>{
    const st=estadoEsc[esc.codigo];
    const cifras = st.pendiente
      ? `<div class="frac" style="color:var(--texto-suave);font-size:11px">Pendiente</div>`
      : `<div class="frac"><span style="color:#16a34a">${st.presentes}</span>/<span style="color:#dc2626">${st.ausentes}</span></div>
         <div class="lbl">pres/aus</div>`;
    return `<div class="esc-item" data-codigo="${esc.codigo}">
      <div class="punto ${st.color}"></div>
      <div>
        <div class="nombre">${esc.nombre}</div>
        <div class="meta">Cód ${esc.codigo}${esc.distrito?" · "+esc.distrito:""}</div>
      </div>
      <div class="cifras">${cifras}</div>
    </div>`;
  }).join("");
  cont.querySelectorAll(".esc-item").forEach(el=>{
    el.addEventListener("click",()=>{
      const m=marcadores[el.dataset.codigo];
      if(m){ mapa.flyTo(m.getLatLng(),15,{duration:.8}); m.openPopup(); }
    });
  });
}

function pintarTablaEstudiantes(){
  const tbody = document.getElementById("tbodyEst");
  const q = normalizar(busquedaEst);
  let lista = estudiantes.filter(est=>{
    if(!pasaTurno(est)) return false;
    if(fechaSel!=="" && est.fecha!==fechaSel) return false;
    if(filtroTarjeta==="asistentes" && !est.asistio) return false;
    if(filtroTarjeta==="ausentes" && (!est.registrado || est.asistio)) return false; // ausente real (0)
    if(filtroTarjeta==="pendientes" && est.registrado) return false;                  // sin reportar (vacío)
    if(q && !normalizar(est.nombre).includes(q) && !normalizar(est.escuela).includes(q) && !normalizar(est.nie).includes(q)) return false;
    return true;
  });
  document.getElementById("contadorEst").textContent = lista.length.toLocaleString("es-SV") + " registros";
  const MAX = 500;
  const recortada = lista.slice(0, MAX);
  tbody.innerHTML = recortada.map(e=>{
    const badge = !e.registrado
      ? '<span class="badge pend">Pendiente</span>'
      : (e.asistio ? '<span class="badge si">Asistió</span>' : '<span class="badge no">Ausente</span>');
    return `<tr>
    <td>${e.nombre}</td>
    <td title="${e.escuela}">${e.escuela}</td>
    <td>${e.seccion||"–"}</td>
    <td>${e.fecha||"–"}</td>
    <td>${e.turno||"–"}</td>
    <td>${badge}</td>
  </tr>`;}).join("");
  if(lista.length>MAX){
    tbody.innerHTML += `<tr><td colspan="6" style="text-align:center;color:var(--texto-suave);padding:10px">Mostrando ${MAX} de ${lista.length} registros. Use los filtros o el buscador para acotar.</td></tr>`;
  }
  if(lista.length===0){
    tbody.innerHTML = `<tr><td colspan="6" class="vacio">No hay estudiantes que coincidan con el filtro.</td></tr>`;
  }
}

/* ================= AVISOS ================= */
function mostrarAviso(m){ const a=document.getElementById("aviso"); a.textContent=m; a.style.display="block"; }
function ocultarAviso(){ document.getElementById("aviso").style.display="none"; }

/* ================= EVENTOS ================= */
document.getElementById("btnActualizar").addEventListener("click", cargarDatos);
document.getElementById("selFecha").addEventListener("change", ev=>{
  fechaSel = ev.target.value; yaAjustado=false; procesarYPintar();
});
document.getElementById("selTurno").addEventListener("change", ev=>{
  turnoSel = ev.target.value; procesarYPintar();
});
document.getElementById("buscarEsc").addEventListener("input", ev=>{
  busquedaEsc = ev.target.value.trim(); pintarMapa(); pintarListaEscuelas();
});
document.getElementById("buscarEst").addEventListener("input", ev=>{
  busquedaEst = ev.target.value.trim(); pintarTablaEstudiantes();
});
document.querySelectorAll(".tarjeta").forEach(card=>{
  card.addEventListener("click",()=>{
    const f = card.dataset.f;
    filtroTarjeta = (filtroTarjeta===f) ? "todas" : f;  // segundo clic deselecciona
    document.querySelectorAll(".tarjeta").forEach(c=>c.classList.remove("activa"));
    if(filtroTarjeta==="todas") document.getElementById("cardEscuelas").classList.add("activa");
    else card.classList.add("activa");
    pintarListaEscuelas(); pintarTablaEstudiantes();
  });
});
document.getElementById("autoRefresco").addEventListener("change", aplicarAutoRefresco);
function aplicarAutoRefresco(){
  if(temporizador){ clearInterval(temporizador); temporizador=null; }
  const seg = parseInt(document.getElementById("autoRefresco").value,10);
  if(seg>0) temporizador = setInterval(cargarDatos, seg*1000);
}

/* ================= INICIO ================= */
cargarDatos();
aplicarAutoRefresco();
</script>
